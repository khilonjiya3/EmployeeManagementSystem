name: attendance_payroll_app
description: Employee Attendance, Expense & Payroll Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.5.4

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.1.4

  # UI & Design
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  lottie: ^3.1.2

  # Forms & Validation
  reactive_forms: ^17.0.0

  # Local Storage & Offline
  drift: ^2.19.1
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0
  connectivity_plus: ^6.0.3

  # File & Image
  image_picker: ^1.1.2
  file_picker: ^8.0.6
  permission_handler: ^11.3.1
  flutter_image_compress: ^2.3.0

  # Location / GPS
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Date & Time
  intl: ^0.19.0
  table_calendar: ^3.1.2

  # Export / Reports
  pdf: ^3.10.8
  printing: ^5.13.1
  excel: ^4.0.3
  share_plus: ^9.0.0
  open_filex: ^4.5.0

  # Notifications (Firebase)
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.1
  flutter_local_notifications: ^17.2.2

  # Prefs
  shared_preferences: ^2.3.1

  # Utils
  uuid: ^4.4.0
  crypto: ^3.0.3
  equatable: ^2.0.5
  dartz: ^0.10.1
  logger: ^2.4.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  drift_dev: ^2.19.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
